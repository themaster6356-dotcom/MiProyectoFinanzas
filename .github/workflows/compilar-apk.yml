name: Compilar APK Android

# Cuándo se ejecuta esta acción
on:
  push:
    branches: [ "main", "master" ] # Cada vez que subas código a la rama principal
  workflow_dispatch: # Te permite ejecutarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest # Usa una máquina virtual con Linux

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java (Requerido para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Construir el APK con Flet
        run: flet build apk --yes

      - name: Subir el APK generado a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MisFinanzas-APK
          path: build/apk/**/*.apk
